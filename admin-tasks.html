<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Tasks | Admin Control</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background-color: #05070a; color: white; font-family: 'Inter', sans-serif; }
        input { background: #1e293b !important; border: 1px solid #334155 !important; color: white !important; }
        .task-card { background: #0f172a; border: 1px solid #1e293b; transition: 0.3s; }
    </style>
</head>
<body class="p-6 md:p-12">

    <div class="max-w-5xl mx-auto grid grid-cols-1 md:grid-cols-2 gap-10">
        
        <div class="task-card p-8 md:p-10 rounded-[40px] shadow-2xl h-fit">
            <header class="mb-8">
                <h1 class="text-2xl font-black uppercase italic tracking-tighter text-blue-500">
                    <i class="fas fa-plus-circle mr-2"></i> Add <span class="text-white">Task</span>
                </h1>
            </header>
            
            <form id="taskForm" class="space-y-5">
                <div>
                    <label class="text-[10px] font-black uppercase text-slate-500 tracking-widest ml-1">Task Title</label>
                    <input type="text" id="taskName" required placeholder="Watch Video / Visit Site" class="w-full p-4 rounded-xl outline-none focus:border-blue-500 text-sm font-bold mt-1">
                </div>
                
                <div>
                    <label class="text-[10px] font-black uppercase text-slate-500 tracking-widest ml-1">Reward ($)</label>
                    <input type="number" id="taskReward" step="0.0001" required placeholder="0.0050" class="w-full p-4 rounded-xl outline-none focus:border-blue-500 text-sm font-black text-[#00e676] mt-1">
                </div>

                <div>
                    <label class="text-[10px] font-black uppercase text-slate-500 tracking-widest ml-1">Task URL</label>
                    <input type="url" id="taskLink" required placeholder="https://..." class="w-full p-4 rounded-xl outline-none focus:border-blue-500 text-sm font-bold mt-1">
                </div>
                
                <button type="submit" id="submitBtn" class="w-full bg-blue-600 py-4 rounded-xl font-black uppercase tracking-widest hover:bg-blue-500 transition shadow-lg">Publish Now</button>
                <a href="admin.html" class="block text-center text-slate-500 text-[10px] font-black uppercase mt-4 tracking-widest hover:text-white transition">Back to Panel</a>
            </form>
        </div>

        <div class="space-y-6">
            <h3 class="text-sm font-black uppercase tracking-widest text-slate-400"><i class="fas fa-tasks mr-2"></i> Active Tasks</h3>
            <div id="liveTaskList" class="space-y-4">
                </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, doc, deleteDoc, serverTimestamp, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDgYMAl2aHN4jRewz5byM98psQK6AK7wlo",
            authDomain: "adcashglobal-efb58.firebaseapp.com",
            projectId: "adcashglobal-efb58",
            storageBucket: "adcashglobal-efb58.firebasestorage.app",
            messagingSenderId: "749601861677",
            appId: "1:749601861677:web:8a8d8da27be53d238f48a4"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // ১. টাস্ক পাবলিশ করা
        const taskForm = document.getElementById('taskForm');
        taskForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const submitBtn = document.getElementById('submitBtn');
            submitBtn.disabled = true;
            submitBtn.innerText = "PUBLISHING...";

            try {
                await addDoc(collection(db, "tasks"), {
                    title: document.getElementById('taskName').value,
                    reward: parseFloat(document.getElementById('taskReward').value),
                    link: document.getElementById('taskLink').value,
                    createdAt: serverTimestamp()
                });
                taskForm.reset();
                alert("Task Added!");
            } catch (err) { alert(err.message); }
            
            submitBtn.disabled = false;
            submitBtn.innerText = "Publish Now";
        });

        // ২. লাইভ টাস্ক লিস্ট দেখানো
        const q = query(collection(db, "tasks"), orderBy("createdAt", "desc"));
        onSnapshot(q, (snapshot) => {
            const list = document.getElementById('liveTaskList');
            list.innerHTML = "";
            snapshot.forEach(tDoc => {
                const t = tDoc.data();
                list.innerHTML += `
                    <div class="task-card p-5 rounded-2xl flex justify-between items-center border-l-4 border-blue-500">
                        <div>
                            <p class="font-bold text-sm">${t.title}</p>
                            <p class="text-[10px] text-[#00e676] font-black italic">$${t.reward.toFixed(4)}</p>
                        </div>
                        <button onclick="deleteTask('${tDoc.id}')" class="text-red-500 hover:bg-red-500/10 p-3 rounded-xl transition">
                            <i class="fas fa-trash-alt"></i>
                        </button>
                    </div>
                `;
            });
        });

        // ৩. টাস্ক ডিলিট করা
        window.deleteTask = async (id) => {
            if(confirm("Delete this task?")) {
                await deleteDoc(doc(db, "tasks", id));
            }
        };
    </script>
</body>
</html>
