<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Users | AdCashGlobal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background-color: #05070a; color: white; font-family: 'Inter', sans-serif; }
        .admin-card { background: #0f172a; border: 1px solid #1e293b; }
        input { background: #1e293b !important; border: 1px solid #334155 !important; color: white !important; }
    </style>
</head>
<body class="flex min-h-screen">

    <nav class="w-64 bg-[#0f172a] border-r border-slate-800 p-6 space-y-8 hidden md:block sticky top-0 h-screen">
        <div class="text-xl font-black italic uppercase text-[#00e676]">Master Admin</div>
        <div class="space-y-4">
            <a href="admin.html" class="flex items-center gap-3 text-sm font-bold text-slate-400 p-3 transition"><i class="fas fa-chart-pie"></i> Overview</a>
            <a href="admin-users.html" class="flex items-center gap-3 text-sm font-bold text-[#00e676] bg-green-500/10 p-3 rounded-xl"><i class="fas fa-users"></i> Users Manage</a>
            <a href="admin-withdrawals.html" class="flex items-center gap-3 text-sm font-bold text-slate-400 p-3 transition"><i class="fas fa-money-check-alt"></i> Withdrawals</a>
            <a href="admin-tasks.html" class="flex items-center gap-3 text-sm font-bold text-slate-400 p-3 transition"><i class="fas fa-plus-circle"></i> Add Tasks</a>
            <a href="admin-settings.html" class="flex items-center gap-3 text-sm font-bold text-slate-400 p-3 transition"><i class="fas fa-cog"></i> Site Settings</a>
        </div>
    </nav>

    <main class="flex-1 p-6 md:p-10 space-y-6">
        <header class="flex justify-between items-center">
            <h1 class="text-3xl font-black italic uppercase">Manage <span class="text-[#00e676]">Users</span></h1>
            <div class="relative w-64">
                <i class="fas fa-search absolute left-4 top-4 text-slate-500"></i>
                <input type="text" id="userSearch" placeholder="Search by email..." class="w-full pl-10 pr-4 py-3 rounded-xl outline-none focus:border-[#00e676]">
            </div>
        </header>

        <section class="admin-card rounded-[30px] overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead class="bg-slate-900/50 text-slate-500 uppercase text-[10px] font-black">
                        <tr>
                            <th class="p-6">User Details</th>
                            <th class="p-6">Current Balance</th>
                            <th class="p-6">Joined Date</th>
                            <th class="p-6 text-right">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="allUserList">
                        </tbody>
                </table>
            </div>
        </section>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, onSnapshot, doc, updateDoc, deleteDoc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDgYMAl2aHN4jRewz5byM98psQK6AK7wlo",
            authDomain: "adcashglobal-efb58.firebaseapp.com",
            projectId: "adcashglobal-efb58",
            storageBucket: "adcashglobal-efb58.firebasestorage.app",
            messagingSenderId: "749601861677",
            appId: "1:749601861677:web:8a8d8da27be53d238f48a4"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // লগইন চেক
        onAuthStateChanged(auth, (user) => { if (!user) window.location.href = "index.html"; });

        // ইউজার লিস্ট লোড করা
        const userRef = query(collection(db, "users"), orderBy("joinedAt", "desc"));
        onSnapshot(userRef, (snapshot) => {
            renderUsers(snapshot.docs);
        });

        function renderUsers(docs) {
            const list = document.getElementById('allUserList');
            list.innerHTML = "";
            docs.forEach(docSnap => {
                const u = docSnap.data();
                list.innerHTML += `
                    <tr class="border-b border-slate-800/50 hover:bg-slate-800/30 transition">
                        <td class="p-6">
                            <p class="font-bold text-white">${u.name || 'Anonymous'}</p>
                            <p class="text-[11px] text-slate-500">${u.email}</p>
                        </td>
                        <td class="p-6 text-[#00e676] font-black italic">$${(u.balance || 0).toFixed(4)}</td>
                        <td class="p-6 text-xs text-slate-400">${u.dateJoined || 'N/A'}</td>
                        <td class="p-6 text-right space-x-2">
                            <button onclick="editBalance('${docSnap.id}', ${u.balance})" class="bg-blue-500/10 text-blue-500 p-2 rounded-lg hover:bg-blue-500 hover:text-white transition"><i class="fas fa-edit"></i></button>
                            <button onclick="deleteUser('${docSnap.id}')" class="bg-red-500/10 text-red-500 p-2 rounded-lg hover:bg-red-500 hover:text-white transition"><i class="fas fa-trash"></i></button>
                        </td>
                    </tr>
                `;
            });
        }

        // সার্চ ফাংশন
        document.getElementById('userSearch').addEventListener('input', (e) => {
            const val = e.target.value.toLowerCase();
            const rows = document.querySelectorAll('#allUserList tr');
            rows.forEach(row => {
                const email = row.querySelector('td:nth-child(1)').innerText.toLowerCase();
                row.style.display = email.includes(val) ? '' : 'none';
            });
        });

        // ব্যালেন্স এডিট
        window.editBalance = async (id, oldBal) => {
            const newBal = prompt("নতুন ব্যালেন্স সেট করুন ($):", oldBal);
            if (newBal !== null && !isNaN(newBal)) {
                await updateDoc(doc(db, "users", id), { balance: parseFloat(newBal) });
                alert("Balance updated!");
            }
        };

        // ইউজার ডিলিট
        window.deleteUser = async (id) => {
            if (confirm("আপনি কি নিশ্চিতভাবে এই ইউজারকে ডিলিট করতে চান?")) {
                await deleteDoc(doc(db, "users", id));
                alert("User deleted!");
            }
        };

    </script>
</body>
</html>
