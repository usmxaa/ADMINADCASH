<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Withdrawals | Admin Control</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background-color: #05070a; color: white; font-family: 'Inter', sans-serif; }
        .admin-card { background: #0f172a; border: 1px solid #1e293b; }
        tr:hover { background: rgba(255,255,255,0.02); }
    </style>
</head>
<body class="p-6 md:p-12">

    <div class="max-w-6xl mx-auto space-y-8">
        <div class="flex justify-between items-center">
            <div>
                <h1 class="text-3xl font-black uppercase italic tracking-tighter text-yellow-500">
                    <i class="fas fa-money-check-alt mr-2"></i> Withdrawal Requests
                </h1>
                <p class="text-slate-500 text-xs font-bold uppercase tracking-widest mt-1">Manage user cashout status</p>
            </div>
            <a href="admin-dashboard.html" class="bg-slate-800 hover:bg-slate-700 px-6 py-3 rounded-xl font-black uppercase text-[10px] tracking-widest transition">Back to Panel</a>
        </div>

        <div class="admin-card rounded-[35px] overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead class="bg-slate-900/80 text-slate-500 uppercase text-[10px] font-black tracking-widest">
                        <tr>
                            <th class="p-6">User Email</th>
                            <th class="p-6">Amount</th>
                            <th class="p-6">Method</th>
                            <th class="p-6">Wallet Details</th>
                            <th class="p-6">Status</th>
                            <th class="p-6 text-right">Action</th>
                        </tr>
                    </thead>
                    <tbody id="withdrawTableBody">
                        <tr>
                            <td colspan="6" class="p-20 text-center text-slate-600 font-bold uppercase tracking-widest text-xs">
                                <i class="fas fa-spinner fa-spin mr-2"></i> Loading Requests...
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, onSnapshot, doc, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDgYMAl2aHN4jRewz5byM98psQK6AK7wlo",
            authDomain: "adcashglobal-efb58.firebaseapp.com",
            projectId: "adcashglobal-efb58",
            storageBucket: "adcashglobal-efb58.firebasestorage.app",
            messagingSenderId: "749601861677",
            appId: "1:749601861677:web:8a8d8da27be53d238f48a4"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const withdrawTableBody = document.getElementById('withdrawTableBody');

        // ১. রিয়েল-টাইম উইথড্র রিকোয়েস্ট লোড করা
        onSnapshot(collection(db, "withdrawals"), (snapshot) => {
            if (snapshot.empty) {
                withdrawTableBody.innerHTML = `<tr><td colspan="6" class="p-20 text-center text-slate-500 font-bold uppercase tracking-widest text-xs">No requests found.</td></tr>`;
                return;
            }

            let html = "";
            snapshot.forEach((request) => {
                const data = request.data();
                const id = request.id;
                
                const statusColor = data.status === 'pending' ? 'text-yellow-500' : (data.status === 'success' ? 'text-green-500' : 'text-red-500');

                html += `
                    <tr class="border-b border-slate-800/50">
                        <td class="p-6 font-bold text-sm">${data.email}</td>
                        <td class="p-6 font-black text-[#00e676]">$${parseFloat(data.amount).toFixed(3)}</td>
                        <td class="p-6 uppercase text-[10px] font-black text-slate-400">${data.method}</td>
                        <td class="p-6 text-xs text-slate-300 font-mono">${data.wallet}</td>
                        <td class="p-6 font-black uppercase text-[10px] ${statusColor}">${data.status}</td>
                        <td class="p-6 text-right space-x-2">
                            ${data.status === 'pending' ? `
                                <button onclick="handleWithdraw('${id}', 'success')" class="bg-green-500/10 text-green-500 border border-green-500/20 px-4 py-2 rounded-lg text-[10px] font-black uppercase hover:bg-green-500 hover:text-black transition">Approve</button>
                                <button onclick="handleWithdraw('${id}', 'rejected', '${data.uid}', ${data.amount})" class="bg-red-500/10 text-red-500 border border-red-500/20 px-4 py-2 rounded-lg text-[10px] font-black uppercase hover:bg-red-500 hover:text-white transition">Reject</button>
                            ` : `<span class="text-slate-600 italic text-[10px]">Processed</span>`}
                        </td>
                    </tr>
                `;
            });
            withdrawTableBody.innerHTML = html;
        });

        // ২. উইথড্র হ্যান্ডেল করা (Approve/Reject)
        window.handleWithdraw = async (reqId, status, userId = null, amount = 0) => {
            const confirmMsg = status === 'success' ? "Approve this payment?" : "Reject and refund balance?";
            if (!confirm(confirmMsg)) return;

            try {
                const reqRef = doc(db, "withdrawals", reqId);
                
                // স্ট্যাটাস আপডেট
                await updateDoc(reqRef, { status: status });

                // যদি রিজেক্ট হয়, তবে ইউজারের ব্যালেন্স ফেরত দিয়ে দেওয়া
                if (status === 'rejected' && userId) {
                    const userRef = doc(db, "users", userId);
                    await updateDoc(userRef, {
                        balance: increment(parseFloat(amount))
                    });
                    alert("Rejected! Balance refunded to user.");
                } else if (status === 'success') {
                    alert("Payment approved successfully!");
                }
            } catch (error) {
                console.error(error);
                alert("Error: " + error.message);
            }
        };
    </script>
</body>
</html>
