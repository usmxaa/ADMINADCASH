<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Users Management | Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background-color: #05070a; color: white; font-family: 'Inter', sans-serif; }
        .admin-card { background: #0f172a; border: 1px solid #1e293b; border-radius: 24px; }
        tr:hover { background: rgba(255,255,255,0.02); }
        input { background: #1e293b !important; border: 1px solid #334155 !important; color: white !important; }
        .text-primary-green { color: #00e676; }
    </style>
</head>
<body class="p-6 md:p-12">

    <div class="max-w-6xl mx-auto space-y-8">
        <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
            <div>
                <h1 class="text-3xl font-black uppercase italic tracking-tighter text-blue-500">
                    <i class="fas fa-users mr-2"></i> Registered Users
                </h1>
                <p id="userCount" class="text-slate-500 text-xs font-bold uppercase tracking-widest mt-1">Loading users...</p>
            </div>
            <div class="flex gap-4 w-full md:w-auto">
                <input type="text" id="userSearch" placeholder="Search Email..." class="px-4 py-2 rounded-xl text-xs outline-none focus:border-blue-500 w-full md:w-64">
                <a href="admin.html" class="bg-slate-800 hover:bg-slate-700 px-6 py-3 rounded-xl font-black uppercase text-[10px] tracking-widest transition whitespace-nowrap">Back</a>
            </div>
        </div>

        <div class="admin-card overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead class="bg-slate-900/80 text-slate-500 uppercase text-[10px] font-black tracking-widest">
                        <tr>
                            <th class="p-6">User Info</th>
                            <th class="p-6">Joined Date</th>
                            <th class="p-6">Balance</th>
                            <th class="p-6">Role</th>
                            <th class="p-6 text-right">Control</th>
                        </tr>
                    </thead>
                    <tbody id="userTableBody">
                        <tr>
                            <td colspan="5" class="p-20 text-center text-slate-600 font-bold uppercase tracking-widest text-xs">
                                <i class="fas fa-spinner fa-spin mr-2"></i> Fetching Users...
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, onSnapshot, doc, updateDoc, deleteDoc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDgYMAl2aHN4jRewz5byM98psQK6AK7wlo",
            authDomain: "adcashglobal-efb58.firebaseapp.com",
            projectId: "adcashglobal-efb58",
            storageBucket: "adcashglobal-efb58.firebasestorage.app",
            messagingSenderId: "749601861677",
            appId: "1:749601861677:web:8a8d8da27be53d238f48a4"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const userTableBody = document.getElementById('userTableBody');
        const userCountLabel = document.getElementById('userCount');

        // ১. রিয়াল-টাইম ইউজার লিস্ট (নতুন ইউজার সবার আগে আসবে)
        const q = query(collection(db, "users"), orderBy("joinedAt", "desc"));
        onSnapshot(q, (snapshot) => {
            if (snapshot.empty) {
                userTableBody.innerHTML = `<tr><td colspan="5" class="p-20 text-center text-slate-500 font-bold uppercase tracking-widest text-xs">No users found.</td></tr>`;
                userCountLabel.innerText = "Total Users: 0";
                return;
            }

            userCountLabel.innerText = `Total Registered Users: ${snapshot.size}`;
            let html = "";
            
            snapshot.forEach((userDoc) => {
                const user = userDoc.data();
                const id = userDoc.id;

                html += `
                    <tr class="border-b border-slate-800/50 user-row">
                        <td class="p-6">
                            <div class="font-bold text-sm text-white user-email">${user.email}</div>
                            <div class="text-[10px] text-slate-500 font-mono">${id}</div>
                        </td>
                        <td class="p-6 text-xs text-slate-400 font-bold uppercase">${user.dateJoined || 'N/A'}</td>
                        <td class="p-6 font-black text-primary-green">$${parseFloat(user.balance || 0).toFixed(4)}</td>
                        <td class="p-6">
                            <span class="px-3 py-1 rounded-full text-[9px] font-black uppercase ${user.role === 'admin' ? 'bg-yellow-500/10 text-yellow-500' : 'bg-blue-500/10 text-blue-500'}">
                                ${user.role || 'user'}
                            </span>
                        </td>
                        <td class="p-6 text-right space-x-2">
                            <button onclick="editBalance('${id}', ${user.balance})" class="text-blue-500 hover:text-white transition p-2" title="Edit Balance"><i class="fas fa-edit"></i></button>
                            <button onclick="deleteUser('${id}')" class="text-red-500 hover:text-white transition p-2" title="Delete User"><i class="fas fa-trash-alt"></i></button>
                        </td>
                    </tr>
                `;
            });
            userTableBody.innerHTML = html;
        });

        // ২. সার্চ ফিল্টার ফাংশন
        document.getElementById('userSearch').addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase();
            const rows = document.querySelectorAll('.user-row');
            rows.forEach(row => {
                const email = row.querySelector('.user-email').innerText.toLowerCase();
                row.style.display = email.includes(term) ? '' : 'none';
            });
        });

        // ৩. ব্যালেন্স আপডেট
        window.editBalance = async (uid, currentBalance) => {
            const newBalance = prompt("নতুন ব্যালেন্স লিখুন:", currentBalance);
            if (newBalance !== null && !isNaN(newBalance)) {
                try {
                    await updateDoc(doc(db, "users", uid), { balance: parseFloat(newBalance) });
                } catch (err) { alert("Error: " + err.message); }
            }
        };

        // ৪. ইউজার ডিলিট
        window.deleteUser = async (uid) => {
            if (confirm("আপনি কি নিশ্চিত এই ইউজারকে ডিলিট করতে চান?")) {
                try { await deleteDoc(doc(db, "users", uid)); } catch (err) { alert("Error: " + err.message); }
            }
        };

    </script>
</body>
</html>
